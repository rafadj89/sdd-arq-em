</div></nav>`}

function TAB(id,active){
const cls=active?'tc act':'tc';
return `<div id="t-${id}" class="${cls}">${CONTENT[id]()}</div>`;

function initTabs(){
document.querySelectorAll('.tb').forEach(b=>b.addEventListener('click',()=>{
document.querySelectorAll('.tb').forEach(x=>x.classList.remove('act'));
document.querySelectorAll('.tc').forEach(x=>x.classList.remove('act'));
b.classList.add('act');
document.getElementById('t-'+b.dataset.t).classList.add('act');
setTimeout(initCharts,200);
}));

function COST_LINE(c,n,v){return `<div class="flex items-center justify-between"><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-sm bg-${c}-500"></div><span class="text-slate-300">${n}</span></div><span class="font-mono text-${c}-400">${v}</span></div>`}
function BOX(x,y,w,h,t1,t2,c){return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6" fill="#1e3a5f" stroke="${c}" stroke-width="1.2"/><text x="${x+w/2}" y="${y+h*.42}" font-size="8" font-weight="600" fill="${c}cc" text-anchor="middle">${t1}</text><text x="${x+w/2}" y="${y+h*.75}" font-size="6" fill="#94a3b8" text-anchor="middle">${t2}</text>`}
function ADR(c,id,t,ctx,dec,alt){return `<div class="bg-slate-800/50 rounded-lg p-3 border-l-4 border-${c}-500"><div class="flex items-center gap-2 mb-1"><span class="text-xs px-2 py-0.5 rounded bg-${c}-500/20 text-${c}-300">${id}</span><span class="text-sm font-semibold text-slate-200">${t}</span></div><p class="text-xs text-slate-400"><b class="text-slate-300">Ctx:</b> ${ctx} | <b class="text-slate-300">Dec:</b> ${dec} | <b class="text-slate-300">Alt:</b> ${alt}</p></div>`}
function MEDAL(n,s,g,c,items,meta){return `<div class="rounded-xl overflow-hidden"><div class="bg-gradient-to-br ${g} p-3"><h4 class="text-lg font-bold text-${c}-100">${n}</h4><p class="text-xs opacity-70">${s}</p></div><div class="bg-slate-800/30 border border-slate-700/30 p-3 space-y-2"><div class="text-xs font-semibold text-slate-300">Contenido:</div>${items.map(i=>`<div class="text-xs text-slate-300">&#9679; ${i}</div>`).join('')}<div class="border-t border-slate-700/30 pt-2 mt-2 space-y-1">${meta.map(([k,v])=>`<div class="flex justify-between text-xs"><span class="text-slate-400">${k}</span><span class="text-${c}-300">${v}</span></div>`).join('')}</div></div></div>`}
